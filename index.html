<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getFirestore, doc, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAiFAyzz-t6Cx0KD2w_o2lAJkX65AaNwkU",
    authDomain: "pregnancy-checklist-220be.firebaseapp.com",
    projectId: "pregnancy-checklist-220be",
    storageBucket: "pregnancy-checklist-220be.firebasestorage.app",
    messagingSenderId: "519500972412",
    appId: "1:519500972412:web:8996098156e956fe08a4f9"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const REF = doc(db, "checklist", "shared");

  // Expose to React app via window
  window._firebase = {
    async load() {
      try {
        const snap = await getDoc(REF);
        return snap.exists() ? snap.data() : { checked:{}, subChecked:{}, notes:{} };
      } catch(e) {
        console.error("Firebase load error", e);
        return { checked:{}, subChecked:{}, notes:{} };
      }
    },
    async save(data) {
      try { await setDoc(REF, data); } catch(e) { console.error("Firebase save error", e); }
    },
    subscribe(callback) {
      return onSnapshot(REF, snap => {
        if (snap.exists()) callback(snap.data());
      }, err => console.error("Snapshot error", err));
    }
  };

  // Signal React that Firebase is ready
  window._firebaseReady = true;
  window.dispatchEvent(new Event("firebaseReady"));
</script>

function weeksUntil(w){return w-CURRENT_WEEK;}
function weekLabel(w){
  if(w>40)return "After birth";
  const d=weeksUntil(w);
  if(d<0)return "Past";if(d===0)return "This week";if(d===1)return "Next week";
  return `In ${d} wks`;
}

function SubModal({item,subData,subChecked,onToggle,onClose}){
  const total=subData.sections.reduce((s,sec)=>s+sec.items.length,0);
  const done=subData.sections.reduce((s,sec)=>s+sec.items.filter((_,i)=>subChecked[`${item.id}-${sec.label}-${i}`]).length,0);
  return(
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
        <div style={{position:"sticky",top:0,background:"#FAF6F1",padding:"20px 20px 12px",borderBottom:"1px solid #EDE8E0"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div><div style={{fontSize:11,color:"#9A8E84",letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>Sub-checklist</div>
            <h2 style={{fontSize:18,color:"#2A2018",fontWeight:"normal"}}>{subData.title}</h2></div>
            <button onClick={onClose} style={{background:"#EDE8E0",border:"none",borderRadius:99,width:32,height:32,cursor:"pointer",fontSize:16,color:"#6A5E54"}}>✕</button>
          </div>
          <div style={{marginTop:12,display:"flex",alignItems:"center",gap:10}}>
            <div style={{flex:1,background:"#EDE8E0",borderRadius:99,height:6,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${total?(done/total)*100:0}%`,background:"#6B9E8A",borderRadius:99,transition:"width .4s"}}/>
            </div>
            <span style={{fontSize:12,color:"#9A8E84"}}>{done}/{total}</span>
          </div>
        </div>
        <div style={{padding:"16px 20px 40px"}}>
          {subData.sections.map(sec=>(
            <div key={sec.label} style={{marginBottom:24}}>
              <div style={{fontSize:12,fontWeight:"bold",color:"#6A5E54",letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>{sec.label}</div>
              {sec.items.map((si,i)=>{
                const k=`${item.id}-${sec.label}-${i}`;const dn=!!subChecked[k];
                return(<div key={k} style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:8}}>
                  <button onClick={()=>onToggle(k)} style={{width:20,height:20,borderRadius:5,border:`2px solid ${dn?"#6B9E8A":"#C8C0B8"}`,background:dn?"#6B9E8A":"white",cursor:"pointer",flexShrink:0,marginTop:1,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {dn&&<span style={{color:"white",fontSize:11}}>✓</span>}
                  </button>
                  <span style={{fontSize:14,color:dn?"#9A8E84":"#3A3028",textDecoration:dn?"line-through":"none",lineHeight:1.5}}>{si}</span>
                </div>);
              })}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ShopModal({guide,onClose}){
  return(
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
        <div style={{position:"sticky",top:0,background:"#FAF6F1",padding:"20px 20px 12px",borderBottom:"1px solid #EDE8E0",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div><div style={{fontSize:11,color:"#8A7AB5",letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>Shopping Guide</div>
          <h2 style={{fontSize:18,color:"#2A2018",fontWeight:"normal"}}>{guide.title}</h2></div>
          <button onClick={onClose} style={{background:"#EDE8E0",border:"none",borderRadius:99,width:32,height:32,cursor:"pointer",fontSize:16,color:"#6A5E54"}}>✕</button>
        </div>
        <div style={{padding:"16px 20px 40px"}}>
          <p style={{fontSize:14,color:"#5A4E46",lineHeight:1.6,marginBottom:20}}>{guide.intro}</p>
          <div style={{marginBottom:24}}>
            <div style={{fontSize:12,fontWeight:"bold",color:"#6A5E54",letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>What to Know</div>
            {guide.tips.map((t,i)=><div key={i} style={{display:"flex",gap:10,marginBottom:8,alignItems:"flex-start"}}><span style={{color:"#8A7AB5",fontSize:16,lineHeight:1,flexShrink:0}}>•</span><span style={{fontSize:14,color:"#3A3028",lineHeight:1.5}}>{t}</span></div>)}
          </div>
          <div>
            <div style={{fontSize:12,fontWeight:"bold",color:"#6A5E54",letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>Top Picks</div>
            {guide.picks.map((p,i)=>(
              <div key={i} style={{background:"white",borderRadius:10,padding:"12px 14px",marginBottom:8,border:"1px solid #EDE8E0"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                  <div><div style={{fontSize:15,fontWeight:"bold",color:"#2A2018"}}>{p.name}</div><div style={{fontSize:11,color:"#8A7AB5",marginTop:2}}>{p.type}</div></div>
                  <div style={{fontSize:13,flexShrink:0}}>{p.rating}</div>
                </div>
                <div style={{fontSize:13,color:"#5A4E46",marginTop:6,lineHeight:1.4}}>{p.note}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function NoteModal({item,currentNote,onSave,onClose}){
  const [val,setVal]=useState(currentNote||"");
  return(
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-sheet" style={{padding:"20px 20px 40px"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h3 style={{fontSize:16,fontWeight:"normal",color:"#2A2018"}}>Note: {item.label}</h3>
          <button onClick={onClose} style={{background:"#EDE8E0",border:"none",borderRadius:99,width:32,height:32,cursor:"pointer",fontSize:16,color:"#6A5E54"}}>✕</button>
        </div>
        <textarea value={val} onChange={e=>setVal(e.target.value)} placeholder="Add a note — appointment time, decisions made, things to remember…"
          style={{width:"100%",minHeight:100,border:"1px solid #C8C0B8",borderRadius:10,padding:"12px 14px",fontSize:14,fontFamily:"Georgia,serif",color:"#3A3028",background:"white",resize:"vertical"}}/>
        <button onClick={()=>{onSave(val);onClose();}} style={{marginTop:12,width:"100%",padding:13,background:"#4A7B6A",color:"white",border:"none",borderRadius:10,fontSize:15,cursor:"pointer",fontFamily:"Georgia,serif"}}>Save note</button>
      </div>
    </div>
  );
}

// ── Check item ─────────────────────────────────────────────────────────────────
function CheckItem({item,checked,toggle,userNotes,onNoteOpen,onSubOpen,onShopOpen}){
  const cat=CATEGORIES[item.category];
  const done=!!checked[item.id];
  const hasNote=!!(userNotes[item.id]);
  const urgent=weeksUntil(item.week)>=0&&weeksUntil(item.week)<=3&&!done;
  return(
    <div style={{background:done?"#F5F2EE":"white",borderRadius:10,marginBottom:8,border:`1px solid ${done?"#DDD8D0":urgent?"#E8C4B0":"#EDE8E0"}`,transition:"all .2s"}}>
      <div style={{display:"flex",alignItems:"flex-start",gap:12,padding:"12px 14px"}}>
        <button onClick={()=>toggle(item.id)} style={{width:22,height:22,borderRadius:6,border:`2px solid ${done?cat.color:"#C8C0B8"}`,background:done?cat.color:"white",cursor:"pointer",flexShrink:0,marginTop:1,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .2s"}}>
          {done&&<span style={{color:"white",fontSize:13,lineHeight:1}}>✓</span>}
        </button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:4}}>
            {urgent&&<span style={{fontSize:10,background:"#FDF0EE",color:"#C0574A",padding:"2px 6px",borderRadius:99,fontWeight:"bold"}}>NOW</span>}
            <span style={{fontSize:10,background:"#F0EBE4",color:"#8A7E74",padding:"2px 6px",borderRadius:99}}>{weekLabel(item.week)}</span>
          </div>
          <div style={{fontSize:14,color:done?"#9A8E84":"#3A3028",textDecoration:done?"line-through":"none",lineHeight:1.4}}>{item.label}</div>
          {item.notes&&<div style={{fontSize:12,color:"#8A7E74",marginTop:4,lineHeight:1.4}}>{item.notes}</div>}
          {hasNote&&<div style={{fontSize:12,color:"#5B8DB8",marginTop:5,background:"#EDF3FA",borderRadius:6,padding:"5px 8px",lineHeight:1.4}}>📝 {userNotes[item.id]}</div>}
          <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
            {item.hasSubChecklist&&<button onClick={()=>onSubOpen(item)} style={{fontSize:11,background:"#EDF5F2",color:"#4A7B6A",border:"1px solid #C4DDD6",borderRadius:99,padding:"3px 10px",cursor:"pointer",fontFamily:"Georgia,serif"}}>☑ Sub-checklist</button>}
            {item.hasShoppingGuide&&<button onClick={()=>onShopOpen(item)} style={{fontSize:11,background:"#F2EFF8",color:"#6A5A9A",border:"1px solid #C8C0E0",borderRadius:99,padding:"3px 10px",cursor:"pointer",fontFamily:"Georgia,serif"}}>🛒 Buying guide</button>}
            <button onClick={()=>onNoteOpen(item)} style={{fontSize:11,background:hasNote?"#EDF3FA":"#F5F2EE",color:hasNote?"#3A7AB8":"#8A7E74",border:`1px solid ${hasNote?"#BDD0E8":"#DDD8D0"}`,borderRadius:99,padding:"3px 10px",cursor:"pointer",fontFamily:"Georgia,serif"}}>
              {hasNote?"✏️ Edit note":"+ Add note"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function SectionHeader({label,subtitle,count,done,isOpen,onToggle,color}){
  const pct=count?Math.round((done/count)*100):0;
  return(
    <button onClick={onToggle} style={{width:"100%",textAlign:"left",background:"none",border:"none",cursor:"pointer",padding:"0 0 10px",display:"flex",alignItems:"center",gap:10}}>
      <div style={{flex:1}}>
        <div style={{fontSize:17,fontWeight:"bold",color:"#2A2018"}}>{label}</div>
        {subtitle&&<div style={{fontSize:12,color:"#9A8E84",marginTop:1}}>{subtitle}</div>}
      </div>
      <div style={{fontSize:12,color:"#9A8E84",flexShrink:0}}>{done}/{count}</div>
      <div style={{width:48,height:6,background:"#EDE8E0",borderRadius:99,overflow:"hidden",flexShrink:0}}>
        <div style={{height:"100%",width:`${pct}%`,background:color||"#6B9E8A",borderRadius:99,transition:"width .5s"}}/>
      </div>
      <span style={{color:"#9A8E84",fontSize:12,flexShrink:0}}>{isOpen?"▲":"▼"}</span>
    </button>
  );
}

// ── Main app ───────────────────────────────────────────────────────────────────
function App(){
  const [state,setState]   = useState({checked:{},subChecked:{},notes:{}});
  const [synced,setSynced] = useState(false); // true once first Firebase load done
  const [syncStatus,setSyncStatus] = useState("connecting"); // connecting | live | error
  const [view,setView]     = useState("timeline");
  const [filter,setFilter] = useState("all");
  const [search,setSearch] = useState("");
  const [openSections,setOpenSections] = useState(()=>{
    const o={};
    TIMELINE_GROUPS.forEach(g=>o[g.id]=true);
    Object.keys(CATEGORIES).forEach(c=>o[`cat-${c}`]=true);
    return o;
  });
  const [toast,setToast]       = useState(null);
  const [activeNote,setActiveNote]   = useState(null);
  const [activeSub,setActiveSub]     = useState(null);
  const [activeShop,setActiveShop]   = useState(null);
  const isSaving = useRef(false);
  const pendingSave = useRef(null);

  // Connect to Firebase
  useEffect(()=>{
    function init(){
      const fb = window._firebase;
      if(!fb){ setSyncStatus("error"); return; }
      // Load initial state
      fb.load().then(data=>{
        setState(data);
        setSynced(true);
        setSyncStatus("live");
      }).catch(()=>setSyncStatus("error"));
      // Subscribe to real-time updates
      const unsub = fb.subscribe(data=>{
        if(!isSaving.current) setState(data);
      });
      return unsub;
    }
    if(window._firebaseReady){ return init(); }
    window.addEventListener("firebaseReady", init, {once:true});
  },[]);

  // Debounced save to Firebase
  const saveToFirebase = useCallback((newState)=>{
    if(!window._firebase) return;
    if(pendingSave.current) clearTimeout(pendingSave.current);
    pendingSave.current = setTimeout(async()=>{
      isSaving.current = true;
      await window._firebase.save(newState);
      setTimeout(()=>{ isSaving.current=false; },500);
    }, 400);
  },[]);

  function updateState(next){
    setState(next);
    saveToFirebase(next);
  }

  function toggle(id){
    const c={...state.checked,[id]:!state.checked[id]};
    if(!c[id])delete c[id];
    const next={...state,checked:c};
    updateState(next);
    showToast(c[id]?"✓ Checked off":"Unchecked");
  }
  function toggleSub(k){
    const s={...state.subChecked,[k]:!state.subChecked[k]};
    if(!s[k])delete s[k];
    updateState({...state,subChecked:s});
  }
  function saveNote(id,text){
    const n={...state.notes};
    if(text.trim())n[id]=text.trim();else delete n[id];
    updateState({...state,notes:n});
  }
  function toggleSection(id){setOpenSections(o=>({...o,[id]:!o[id]}));}
  function showToast(msg){setToast(msg);setTimeout(()=>setToast(null),1800);}

  const today=new Date();
  const daysLeft=Math.max(0,Math.round((DUE_DATE-today)/(1000*60*60*24)));
  const weeksLeft=Math.floor(daysLeft/7);
  const total=ALL_ITEMS.length;
  const done=Object.values(state.checked).filter(Boolean).length;
  const pct=Math.round((done/total)*100);

  const filtered=ALL_ITEMS.filter(item=>{
    if(search){const q=search.toLowerCase();if(!item.label.toLowerCase().includes(q)&&!(item.notes||"").toLowerCase().includes(q))return false;}
    if(filter==="urgent")return weeksUntil(item.week)<=3&&weeksUntil(item.week)>=0&&!state.checked[item.id];
    if(filter==="incomplete")return !state.checked[item.id];
    return true;
  });

  const iProps={checked:state.checked,toggle,userNotes:state.notes,onNoteOpen:setActiveNote,onSubOpen:setActiveSub,onShopOpen:setActiveShop};

  const statusDot = syncStatus==="live"
    ? {color:"#6B9E8A", label: synced ? "Live sync on" : "Connecting…"}
    : syncStatus==="connecting"
    ? {color:"#C4956A", label:"Connecting…"}
    : {color:"#C0574A", label:"Offline"};

  if(!synced) return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#FAF6F1",fontFamily:"Georgia,serif",color:"#8A7060",flexDirection:"column",gap:12}}>
      <div style={{fontSize:32}}>🌿</div>
      <div>Connecting to live sync…</div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:"#FAF6F1"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#4A7B6A 0%,#6B9E8A 100%)",padding:"28px 24px 20px",color:"white"}}>
        <div style={{maxWidth:680,margin:"0 auto"}}>
          <div style={{fontSize:11,letterSpacing:3,textTransform:"uppercase",opacity:.8,marginBottom:4}}>First Baby · Due December 11</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
            <h1 style={{fontSize:26,fontWeight:"normal",letterSpacing:"-.5px"}}>Our Pregnancy Journey</h1>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:28,fontWeight:"bold",lineHeight:1}}>{weeksLeft}</div>
              <div style={{fontSize:11,opacity:.8}}>weeks to go</div>
            </div>
          </div>
          <div style={{marginTop:16,background:"rgba(255,255,255,.18)",borderRadius:12,padding:"14px 18px"}}>
            <div style={{display:"flex",alignItems:"center",gap:16}}>
              <div>
                <div style={{fontSize:32,fontWeight:"bold",lineHeight:1}}>{pct}%</div>
                <div style={{fontSize:11,opacity:.8,marginTop:2}}>{done} of {total} done</div>
              </div>
              <div style={{flex:1}}>
                <div style={{background:"rgba(255,255,255,.3)",borderRadius:99,height:8,overflow:"hidden"}}>
                  <div style={{background:"white",height:"100%",width:`${pct}%`,borderRadius:99,transition:"width .5s"}}/>
                </div>
                <div style={{display:"flex",alignItems:"center",marginTop:6,gap:6}}>
                  <span className="sync-dot" style={{background:statusDot.color, ...(syncStatus==="connecting"?{animation:"pulse 1.2s ease infinite"}:{})}}/>
                  <span style={{fontSize:11,opacity:.85}}>{statusDot.label} · changes appear instantly on both devices</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* Nav */}
      <div style={{background:"white",borderBottom:"1px solid #EDE8E0",position:"sticky",top:0,zIndex:10}}>
        <div style={{maxWidth:680,margin:"0 auto"}}>
          <div style={{display:"flex"}}>
            {[{id:"timeline",label:"📅 Timeline"},{id:"category",label:"🗂 Category"}].map(v=>(
              <button key={v.id} onClick={()=>setView(v.id)} style={{flex:1,padding:"12px 0",border:"none",background:"none",cursor:"pointer",fontSize:14,fontFamily:"Georgia,serif",color:view===v.id?"#4A7B6A":"#9A8E84",borderBottom:view===v.id?"2px solid #4A7B6A":"2px solid transparent",fontWeight:view===v.id?"bold":"normal"}}>{v.label}</button>
            ))}
          </div>
          <div style={{padding:"8px 12px 10px",display:"flex",gap:8,alignItems:"center"}}>
            <div style={{flex:1,position:"relative"}}>
              <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:14,color:"#9A8E84"}}>🔍</span>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search items…"
                style={{width:"100%",padding:"7px 10px 7px 30px",border:"1px solid #DDD8D0",borderRadius:8,fontSize:13,fontFamily:"Georgia,serif",color:"#3A3028",background:"#FAF6F1",boxSizing:"border-box"}}/>
            </div>
            {[{id:"all",label:"All"},{id:"urgent",label:"🔴 Due soon"},{id:"incomplete",label:"Remaining"}].map(f=>(
              <button key={f.id} onClick={()=>setFilter(f.id)} style={{padding:"6px 10px",border:"none",borderRadius:8,cursor:"pointer",fontSize:12,fontFamily:"Georgia,serif",background:filter===f.id?"#4A7B6A":"#F0EBE4",color:filter===f.id?"white":"#6A5E54",flexShrink:0}}>{f.label}</button>
            ))}
          </div>
        </div>
      </div>

      {/* Items */}
      <div style={{maxWidth:680,margin:"0 auto",padding:"20px 16px 80px"}}>
        {filtered.length===0?(
          <div style={{textAlign:"center",padding:"60px 20px",color:"#9A8E84"}}>
            <div style={{fontSize:40,marginBottom:12}}>🎉</div>
            <div style={{fontSize:16}}>Nothing left here — great work!</div>
          </div>
        ):view==="timeline"?(
          TIMELINE_GROUPS.map(group=>{
            const gi=filtered.filter(i=>group.weeks.includes(i.week));
            if(!gi.length)return null;
            const dn=gi.filter(i=>state.checked[i.id]).length;
            return(
              <div key={group.id} style={{marginBottom:28}}>
                <SectionHeader label={group.label} subtitle={group.subtitle} count={gi.length} done={dn} isOpen={openSections[group.id]!==false} onToggle={()=>toggleSection(group.id)} color="#6B9E8A"/>
                {openSections[group.id]!==false&&gi.map(item=><CheckItem key={item.id} item={item} {...iProps}/>)}
              </div>
            );
          })
        ):(
          Object.entries(CATEGORIES).map(([catId,cat])=>{
            const ci=filtered.filter(i=>i.category===catId);
            if(!ci.length)return null;
            const dn=ci.filter(i=>state.checked[i.id]).length;
            const key=`cat-${catId}`;
            return(
              <div key={catId} style={{marginBottom:28}}>
                <SectionHeader label={`${cat.emoji} ${cat.label}`} count={ci.length} done={dn} isOpen={openSections[key]!==false} onToggle={()=>toggleSection(key)} color={cat.color}/>
                {openSections[key]!==false&&ci.map(item=><CheckItem key={item.id} item={item} {...iProps}/>)}
              </div>
            );
          })
        )}
      </div>

      {activeNote&&<NoteModal item={activeNote} currentNote={state.notes[activeNote.id]} onSave={t=>saveNote(activeNote.id,t)} onClose={()=>setActiveNote(null)}/>}
      {activeSub&&SUB_CHECKLISTS[activeSub.id]&&<SubModal item={activeSub} subData={SUB_CHECKLISTS[activeSub.id]} subChecked={state.subChecked} onToggle={toggleSub} onClose={()=>setActiveSub(null)}/>}
      {activeShop&&SHOPPING_GUIDES[activeShop.id]&&<ShopModal guide={SHOPPING_GUIDES[activeShop.id]} onClose={()=>setActiveShop(null)}/>}
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
