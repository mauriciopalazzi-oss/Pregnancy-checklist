<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Our Pregnancy Journey 🌿</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FAF6F1;font-family:Georgia,serif;-webkit-font-smoothing:antialiased;min-height:100vh}
button{font-family:Georgia,serif;cursor:pointer}
.hidden{display:none!important}

/* Header */
.header{background:linear-gradient(135deg,#4A7B6A,#6B9E8A);padding:28px 20px 20px;color:white}
.header-inner{max-width:680px;margin:0 auto}
.header-eyebrow{font-size:11px;letter-spacing:3px;text-transform:uppercase;opacity:.8;margin-bottom:4px}
.header-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px}
.header-title{font-size:24px;font-weight:normal;letter-spacing:-.5px}
.header-weeks{text-align:right}
.header-weeks-num{font-size:28px;font-weight:bold;line-height:1}
.header-weeks-label{font-size:11px;opacity:.8}
.progress-box{background:rgba(255,255,255,.18);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:16px}
.progress-pct{font-size:32px;font-weight:bold;line-height:1}
.progress-sub{font-size:11px;opacity:.8;margin-top:2px}
.progress-bar-wrap{flex:1}
.progress-bar-bg{background:rgba(255,255,255,.3);border-radius:99px;height:8px;overflow:hidden}
.progress-bar-fill{background:white;height:100%;border-radius:99px;transition:width .5s}
.sync-row{display:flex;align-items:center;gap:6px;margin-top:6px}
.sync-dot{width:8px;height:8px;border-radius:99px;display:inline-block;background:#6B9E8A}
.sync-dot.orange{background:#C4956A}
.sync-dot.red{background:#C0574A}
.sync-label{font-size:11px;opacity:.85}

/* Nav */
.nav{background:white;border-bottom:1px solid #EDE8E0;position:sticky;top:0;z-index:10}
.nav-inner{max-width:680px;margin:0 auto}
.tab-row{display:flex}
.tab-btn{flex:1;padding:12px 0;border:none;background:none;font-size:14px;color:#9A8E84;border-bottom:2px solid transparent}
.tab-btn.active{color:#4A7B6A;border-bottom-color:#4A7B6A;font-weight:bold}
.filter-row{padding:8px 12px 10px;display:flex;gap:8px;align-items:center}
.search-wrap{flex:1;position:relative}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;color:#9A8E84;pointer-events:none}
.search-input{width:100%;padding:7px 10px 7px 30px;border:1px solid #DDD8D0;border-radius:8px;font-size:13px;font-family:Georgia,serif;color:#3A3028;background:#FAF6F1;outline:none}
.filter-btn{padding:6px 10px;border:none;border-radius:8px;font-size:12px;background:#F0EBE4;color:#6A5E54;white-space:nowrap}
.filter-btn.active{background:#4A7B6A;color:white}

/* Content */
.content{max-width:680px;margin:0 auto;padding:20px 16px 80px}

/* Section */
.section{margin-bottom:28px}
.section-header{width:100%;text-align:left;background:none;border:none;padding:0 0 10px;display:flex;align-items:center;gap:10}
.section-title{font-size:17px;font-weight:bold;color:#2A2018}
.section-subtitle{font-size:12px;color:#9A8E84;margin-top:1px}
.section-count{font-size:12px;color:#9A8E84;flex-shrink:0}
.section-bar-wrap{width:48px;height:6px;background:#EDE8E0;border-radius:99px;overflow:hidden;flex-shrink:0}
.section-bar-fill{height:100%;border-radius:99px;transition:width .5s}
.section-arrow{font-size:12px;color:#9A8E84;flex-shrink:0}

/* Item */
.item{background:white;border-radius:10px;margin-bottom:8px;border:1px solid #EDE8E0;transition:all .2s}
.item.done{background:#F5F2EE;border-color:#DDD8D0;opacity:.8}
.item.urgent{border-color:#E8C4B0}
.item-inner{display:flex;align-items:flex-start;gap:12px;padding:12px 14px}
.check-btn{width:22px;height:22px;border-radius:6px;border:2px solid #C8C0B8;background:white;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:13px;color:white}
.check-btn.checked{background:#6B9E8A;border-color:#6B9E8A}
.item-body{flex:1;min-width:0}
.item-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.tag{font-size:10px;padding:2px 6px;border-radius:99px}
.tag-now{background:#FDF0EE;color:#C0574A;font-weight:bold}
.tag-week{background:#F0EBE4;color:#8A7E74}
.item-label{font-size:14px;color:#3A3028;line-height:1.4}
.item-label.done{text-decoration:line-through;color:#9A8E84}
.item-notes{font-size:12px;color:#8A7E74;margin-top:4px;line-height:1.4}
.item-user-note{font-size:12px;color:#5B8DB8;margin-top:5px;background:#EDF3FA;border-radius:6px;padding:5px 8px;line-height:1.4}
.item-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.action-btn{font-size:11px;border-radius:99px;padding:3px 10px;border:1px solid}
.action-sub{background:#EDF5F2;color:#4A7B6A;border-color:#C4DDD6}
.action-shop{background:#F2EFF8;color:#6A5A9A;border-color:#C8C0E0}
.action-note{background:#F5F2EE;color:#8A7E74;border-color:#DDD8D0}
.action-note.has-note{background:#EDF3FA;color:#3A7AB8;border-color:#BDD0E8}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:#9A8E84}
.empty-emoji{font-size:40px;margin-bottom:12px}
.empty-text{font-size:16px}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal-sheet{background:#FAF6F1;border-radius:20px 20px 0 0;width:100%;max-width:680px;max-height:85vh;overflow-y:auto}
.modal-header{position:sticky;top:0;background:#FAF6F1;padding:20px 20px 12px;border-bottom:1px solid #EDE8E0}
.modal-eyebrow{font-size:11px;color:#9A8E84;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.modal-title{font-size:18px;color:#2A2018;font-weight:normal}
.modal-close{background:#EDE8E0;border:none;border-radius:99px;width:32px;height:32px;font-size:16px;color:#6A5E54;flex-shrink:0}
.modal-header-row{display:flex;justify-content:space-between;align-items:flex-start}
.modal-body{padding:16px 20px 40px}
.modal-progress{display:flex;align-items:center;gap:10;margin-top:12px}
.modal-progress-bar{flex:1;background:#EDE8E0;border-radius:99px;height:6px;overflow:hidden}
.modal-progress-fill{height:100%;background:#6B9E8A;border-radius:99px;transition:width .4s}
.modal-progress-count{font-size:12px;color:#9A8E84;margin-left:10px}

/* Sub-checklist */
.sub-section-label{font-size:12px;font-weight:bold;color:#6A5E54;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;margin-top:20px}
.sub-section-label:first-child{margin-top:0}
.sub-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.sub-check{width:20px;height:20px;border-radius:5px;border:2px solid #C8C0B8;background:white;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:11px;color:white}
.sub-check.checked{background:#6B9E8A;border-color:#6B9E8A}
.sub-label{font-size:14px;color:#3A3028;line-height:1.5}
.sub-label.done{text-decoration:line-through;color:#9A8E84}

/* Shopping guide */
.guide-intro{font-size:14px;color:#5A4E46;line-height:1.6;margin-bottom:20px}
.guide-section-label{font-size:12px;font-weight:bold;color:#6A5E54;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;margin-top:20px}
.guide-section-label:first-child{margin-top:0}
.guide-tip{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.guide-tip-dot{color:#8A7AB5;font-size:16px;line-height:1;flex-shrink:0}
.guide-tip-text{font-size:14px;color:#3A3028;line-height:1.5}
.guide-pick{background:white;border-radius:10px;padding:12px 14px;margin-bottom:8px;border:1px solid #EDE8E0}
.guide-pick-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.guide-pick-name{font-size:15px;font-weight:bold;color:#2A2018}
.guide-pick-type{font-size:11px;color:#8A7AB5;margin-top:2px}
.guide-pick-rating{font-size:13px;flex-shrink:0}
.guide-pick-note{font-size:13px;color:#5A4E46;margin-top:6px;line-height:1.4}

/* Note modal */
.note-textarea{width:100%;min-height:100px;border:1px solid #C8C0B8;border-radius:10px;padding:12px 14px;font-size:14px;font-family:Georgia,serif;color:#3A3028;background:white;resize:vertical;outline:none}
.note-save{margin-top:12px;width:100%;padding:13px;background:#4A7B6A;color:white;border:none;border-radius:10px;font-size:15px}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#4A7B6A;color:white;padding:10px 20px;border-radius:10px;font-size:13px;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.2);white-space:nowrap;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;color:#8A7060;gap:12px}
.loading-emoji{font-size:36px}
.loading-text{font-size:15px}
</style>
</head>

// ── State ──────────────────────────────────────────────────────────────────
let state = { checked:{}, subChecked:{}, notes:{} };
let view = "timeline";
let filter = "all";
let search = "";
let openSections = {};
let isSaving = false;
let saveTimer = null;
let activeModal = null; // {type, item}

// Init open sections
GROUPS.forEach(g => openSections[g.id] = true);
Object.keys(CATS).forEach(c => openSections[`cat-${c}`] = true);

// ── Firebase ───────────────────────────────────────────────────────────────
async function loadFromFirebase() {
  try {
    const snap = await getDoc(REF);
    if (snap.exists()) state = snap.data();
  } catch(e) {
    console.error("Load error:", e);
  }
}

function saveToFirebase() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    isSaving = true;
    try { await setDoc(REF, state); } catch(e) { console.error("Save error:", e); }
    isSaving = false;
  }, 500);
}

function subscribeToFirebase() {
  return onSnapshot(REF, (snap) => {
    if (snap.exists() && !isSaving) {
      state = snap.data();
      render();
    }
  }, (err) => console.error("Snapshot error:", err));
}

// ── Helpers ────────────────────────────────────────────────────────────────
function weeksUntil(w) { return w - CUR_WEEK; }
function weekLabel(w) {
  if (w > 40) return "After birth";
  const d = weeksUntil(w);
  if (d < 0) return "Past";
  if (d === 0) return "This week";
  if (d === 1) return "Next week";
  return `In ${d} wks`;
}
function weeksLeft() {
  return Math.floor(Math.max(0, DUE - new Date()) / (1000*60*60*24*7));
}
function pct(done, total) { return total ? Math.round(done/total*100) : 0; }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg) {
  const t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 1800);
}

// ── Filtering ──────────────────────────────────────────────────────────────
function filteredItems() {
  return ITEMS.filter(item => {
    if (search) {
      const q = search.toLowerCase();
      if (!item.label.toLowerCase().includes(q) && !(item.notes||"").toLowerCase().includes(q)) return false;
    }
    if (filter === "urgent") return weeksUntil(item.week) >= 0 && weeksUntil(item.week) <= 3 && !state.checked[item.id];
    if (filter === "incomplete") return !state.checked[item.id];
    return true;
  });
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const total = ITEMS.length;
  const done = Object.values(state.checked).filter(Boolean).length;
  const p = pct(done, total);
  const wl = weeksLeft();
  const items = filteredItems();

  let sectionsHTML = "";
  if (items.length === 0) {
    sectionsHTML = `<div class="empty"><div class="empty-emoji">🎉</div><div class="empty-text">Nothing left here — great work!</div></div>`;
  } else if (view === "timeline") {
    GROUPS.forEach(g => {
      const gi = items.filter(i => g.weeks.includes(i.week));
      if (!gi.length) return;
      const dn = gi.filter(i => state.checked[i.id]).length;
      const open = openSections[g.id] !== false;
      sectionsHTML += renderSection(g.id, g.label, g.sub, gi, dn, open, "#6B9E8A");
    });
  } else {
    Object.entries(CATS).forEach(([catId, cat]) => {
      const ci = items.filter(i => i.cat === catId);
      if (!ci.length) return;
      const dn = ci.filter(i => state.checked[i.id]).length;
      const key = `cat-${catId}`;
      const open = openSections[key] !== false;
      sectionsHTML += renderSection(key, `${cat.emoji} ${cat.label}`, "", ci, dn, open, cat.color);
    });
  }

  document.getElementById("app").innerHTML = `
    <div class="header">
      <div class="header-inner">
        <div class="header-eyebrow">First Baby · Due December 11</div>
        <div class="header-row">
          <div class="header-title">Our Pregnancy Journey</div>
          <div class="header-weeks">
            <div class="header-weeks-num">${wl}</div>
            <div class="header-weeks-label">weeks to go</div>
          </div>
        </div>
        <div class="progress-box">
          <div>
            <div class="progress-pct">${p}%</div>
            <div class="progress-sub">${done} of ${total} done</div>
          </div>
          <div class="progress-bar-wrap">
            <div class="progress-bar-bg">
              <div class="progress-bar-fill" style="width:${p}%"></div>
            </div>
            <div class="sync-row">
              <span class="sync-dot"></span>
              <span class="sync-label">Live sync · changes appear on both devices instantly</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="nav">
      <div class="nav-inner">
        <div class="tab-row">
          <button class="tab-btn ${view==='timeline'?'active':''}" data-view="timeline">📅 Timeline</button>
          <button class="tab-btn ${view==='category'?'active':''}" data-view="category">🗂 Category</button>
        </div>
        <div class="filter-row">
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input class="search-input" placeholder="Search items…" value="${esc(search)}" id="search-input"/>
          </div>
          <button class="filter-btn ${filter==='all'?'active':''}" data-filter="all">All</button>
          <button class="filter-btn ${filter==='urgent'?'active':''}" data-filter="urgent">🔴 Due soon</button>
          <button class="filter-btn ${filter==='incomplete'?'active':''}" data-filter="incomplete">Remaining</button>
        </div>
      </div>
    </div>

    <div class="content">${sectionsHTML}</div>
  `;

  // Re-attach events
  attachEvents();

  // Re-render modal if open
  if (activeModal) renderModal();
}

function renderSection(id, label, subtitle, items, done, open, color) {
  const p = pct(done, items.length);
  const itemsHTML = open ? items.map(renderItem).join("") : "";
  return `
    <div class="section">
      <button class="section-header" data-section="${id}">
        <div style="flex:1">
          <div class="section-title">${esc(label)}</div>
          ${subtitle ? `<div class="section-subtitle">${esc(subtitle)}</div>` : ""}
        </div>
        <div class="section-count">${done}/${items.length}</div>
        <div class="section-bar-wrap">
          <div class="section-bar-fill" style="width:${p}%;background:${color}"></div>
        </div>
        <div class="section-arrow">${open ? "▲" : "▼"}</div>
      </button>
      ${itemsHTML}
    </div>`;
}

function renderItem(item) {
  const done = !!state.checked[item.id];
  const hasNote = !!state.notes?.[item.id];
  const urgent = weeksUntil(item.week) >= 0 && weeksUntil(item.week) <= 3 && !done;
  const cat = CATS[item.cat];
  const checkColor = done ? cat.color : "#C8C0B8";
  const checkBg = done ? cat.color : "white";

  return `
    <div class="item ${done?'done':''} ${urgent?'urgent':''}">
      <div class="item-inner">
        <button class="check-btn ${done?'checked':''}" style="border-color:${checkColor};background:${checkBg}" data-check="${item.id}">
          ${done ? "✓" : ""}
        </button>
        <div class="item-body">
          <div class="item-tags">
            ${urgent ? `<span class="tag tag-now">NOW</span>` : ""}
            <span class="tag tag-week">${weekLabel(item.week)}</span>
          </div>
          <div class="item-label ${done?'done':''}">${esc(item.label)}</div>
          ${item.notes ? `<div class="item-notes">${esc(item.notes)}</div>` : ""}
          ${hasNote ? `<div class="item-user-note">📝 ${esc(state.notes[item.id])}</div>` : ""}
          <div class="item-actions">
            ${item.sub ? `<button class="action-btn action-sub" data-sub="${item.id}">☑ Sub-checklist</button>` : ""}
            ${item.shop ? `<button class="action-btn action-shop" data-shop="${item.id}">🛒 Buying guide</button>` : ""}
            <button class="action-btn action-note ${hasNote?'has-note':''}" data-note="${item.id}">
              ${hasNote ? "✏️ Edit note" : "+ Add note"}
            </button>
          </div>
        </div>
      </div>
    </div>`;
}

// ── Modal rendering ────────────────────────────────────────────────────────
function renderModal() {
  let existing = document.getElementById("modal-container");
  if (!existing) {
    existing = document.createElement("div");
    existing.id = "modal-container";
    document.body.appendChild(existing);
  }

  if (!activeModal) { existing.innerHTML = ""; return; }

  const {type, item} = activeModal;

  if (type === "sub") {
    const sub = SUBS[item.id];
    if (!sub) { activeModal = null; return; }
    const total = sub.sections.reduce((s,sec) => s + sec.items.length, 0);
    const done = sub.sections.reduce((s,sec) => s + sec.items.filter((_,i) => state.subChecked?.[`${item.id}-${sec.label}-${i}`]).length, 0);
    const p = pct(done, total);

    const sectionsHTML = sub.sections.map(sec => `
      <div class="sub-section-label">${esc(sec.label)}</div>
      ${sec.items.map((si, i) => {
        const key = `${item.id}-${sec.label}-${i}`;
        const dn = !!(state.subChecked?.[key]);
        return `<div class="sub-item">
          <button class="sub-check ${dn?'checked':''}" data-subcheck="${key}">${dn?'✓':''}</button>
          <span class="sub-label ${dn?'done':''}">${esc(si)}</span>
        </div>`;
      }).join("")}
    `).join("");

    existing.innerHTML = `
      <div class="modal-backdrop" id="modal-backdrop">
        <div class="modal-sheet">
          <div class="modal-header">
            <div class="modal-header-row">
              <div>
                <div class="modal-eyebrow">Sub-checklist</div>
                <div class="modal-title">${esc(sub.title)}</div>
              </div>
              <button class="modal-close" id="modal-close">✕</button>
            </div>
            <div class="modal-progress" style="display:flex;align-items:center;gap:0;margin-top:12px">
              <div class="modal-progress-bar" style="flex:1">
                <div class="modal-progress-fill" style="width:${p}%"></div>
              </div>
              <span class="modal-progress-count">${done}/${total}</span>
            </div>
          </div>
          <div class="modal-body">${sectionsHTML}</div>
        </div>
      </div>`;
  }

  else if (type === "shop") {
    const guide = GUIDES[item.id];
    if (!guide) { activeModal = null; return; }

    const tipsHTML = guide.tips.map(t => `
      <div class="guide-tip">
        <span class="guide-tip-dot">•</span>
        <span class="guide-tip-text">${esc(t)}</span>
      </div>`).join("");

    const picksHTML = guide.picks.map(p => `
      <div class="guide-pick">
        <div class="guide-pick-row">
          <div>
            <div class="guide-pick-name">${esc(p.name)}</div>
            <div class="guide-pick-type">${esc(p.type)}</div>
          </div>
          <div class="guide-pick-rating">${p.rating}</div>
        </div>
        <div class="guide-pick-note">${esc(p.note)}</div>
      </div>`).join("");

    existing.innerHTML = `
      <div class="modal-backdrop" id="modal-backdrop">
        <div class="modal-sheet">
          <div class="modal-header">
            <div class="modal-header-row">
              <div>
                <div class="modal-eyebrow" style="color:#8A7AB5">Shopping Guide</div>
                <div class="modal-title">${esc(guide.title)}</div>
              </div>
              <button class="modal-close" id="modal-close">✕</button>
            </div>
          </div>
          <div class="modal-body">
            <p class="guide-intro">${esc(guide.intro)}</p>
            <div class="guide-section-label">What to Know</div>
            ${tipsHTML}
            <div class="guide-section-label">Top Picks</div>
            ${picksHTML}
          </div>
        </div>
      </div>`;
  }

  else if (type === "note") {
    const currentNote = state.notes?.[item.id] || "";
    existing.innerHTML = `
      <div class="modal-backdrop" id="modal-backdrop">
        <div class="modal-sheet" style="padding:20px 20px 40px">
          <div class="modal-header-row" style="margin-bottom:16px">
            <h3 style="font-size:16px;font-weight:normal;color:#2A2018">Note: ${esc(item.label)}</h3>
            <button class="modal-close" id="modal-close">✕</button>
          </div>
          <textarea class="note-textarea" id="note-text" placeholder="Add a note — appointment time, decisions made, things to remember…">${esc(currentNote)}</textarea>
          <button class="note-save" id="note-save">Save note</button>
        </div>
      </div>`;
  }

  attachModalEvents();
}

// ── Event handling ─────────────────────────────────────────────────────────
function attachEvents() {
  // Tab buttons
  document.querySelectorAll("[data-view]").forEach(btn => {
    btn.addEventListener("click", () => {
      view = btn.dataset.view;
      render();
    });
  });

  // Filter buttons
  document.querySelectorAll("[data-filter]").forEach(btn => {
    btn.addEventListener("click", () => {
      filter = btn.dataset.filter;
      render();
    });
  });

  // Search
  const si = document.getElementById("search-input");
  if (si) {
    si.addEventListener("input", e => {
      search = e.target.value;
      render();
    });
    // Keep focus after render
    si.focus();
    si.setSelectionRange(si.value.length, si.value.length);
  }

  // Section toggles
  document.querySelectorAll("[data-section]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.section;
      openSections[id] = !openSections[id];
      render();
    });
  });

  // Check buttons
  document.querySelectorAll("[data-check]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.check;
      if (!state.checked) state.checked = {};
      state.checked[id] = !state.checked[id];
      if (!state.checked[id]) delete state.checked[id];
      saveToFirebase();
      render();
      showToast(state.checked[id] ? "✓ Checked off" : "Unchecked");
    });
  });

  // Sub-checklist buttons
  document.querySelectorAll("[data-sub]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.sub;
      const item = ITEMS.find(i => i.id === id);
      activeModal = {type:"sub", item};
      renderModal();
    });
  });

  // Shopping guide buttons
  document.querySelectorAll("[data-shop]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.shop;
      const item = ITEMS.find(i => i.id === id);
      activeModal = {type:"shop", item};
      renderModal();
    });
  });

  // Note buttons
  document.querySelectorAll("[data-note]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.note;
      const item = ITEMS.find(i => i.id === id);
      activeModal = {type:"note", item};
      renderModal();
    });
  });
}

function attachModalEvents() {
  // Close button
  const closeBtn = document.getElementById("modal-close");
  if (closeBtn) closeBtn.addEventListener("click", () => {
    activeModal = null;
    document.getElementById("modal-container").innerHTML = "";
  });

  // Backdrop click
  const backdrop = document.getElementById("modal-backdrop");
  if (backdrop) backdrop.addEventListener("click", e => {
    if (e.target === backdrop) {
      activeModal = null;
      document.getElementById("modal-container").innerHTML = "";
    }
  });

  // Sub-checklist checks
  document.querySelectorAll("[data-subcheck]").forEach(btn => {
    btn.addEventListener("click", () => {
      const key = btn.dataset.subcheck;
      if (!state.subChecked) state.subChecked = {};
      state.subChecked[key] = !state.subChecked[key];
      if (!state.subChecked[key]) delete state.subChecked[key];
      saveToFirebase();
      renderModal();
    });
  });

  // Note save
  const saveBtn = document.getElementById("note-save");
  if (saveBtn) saveBtn.addEventListener("click", () => {
    const text = document.getElementById("note-text").value.trim();
    if (!state.notes) state.notes = {};
    if (text) state.notes[activeModal.item.id] = text;
    else delete state.notes[activeModal.item.id];
    saveToFirebase();
    activeModal = null;
    document.getElementById("modal-container").innerHTML = "";
    render();
    showToast("Note saved");
  });
}

// ── Boot ───────────────────────────────────────────────────────────────────
(async () => {
  await loadFromFirebase();
  render();
  subscribeToFirebase();
})();
</script>
