<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Our Pregnancy Journey 🌿</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#FAF6F1;font-family:Georgia,serif;-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#EDE8E0}::-webkit-scrollbar-thumb{background:#C4956A;border-radius:3px}
  textarea:focus,input:focus{outline:2px solid #6B9E8A!important}
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center}
  .modal-sheet{background:#FAF6F1;border-radius:20px 20px 0 0;width:100%;max-width:680px;max-height:85vh;overflow-y:auto}
  .toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#4A7B6A;color:white;padding:10px 20px;border-radius:10px;font-size:13px;font-family:Georgia,serif;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.15);animation:slideIn .3s ease;white-space:nowrap}
  @keyframes slideIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#FAF6F1;font-family:Georgia,serif;color:#8A7060;flex-direction:column;gap:12px"><div style="font-size:32px">🌿</div><div>Loading…</div></div></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getFirestore, doc, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyAiFAyzz-t6Cx0KD2w_o2lAJkX65AaNwkU",
    authDomain: "pregnancy-checklist-220be.firebaseapp.com",
    projectId: "pregnancy-checklist-220be",
    storageBucket: "pregnancy-checklist-220be.firebasestorage.app",
    messagingSenderId: "519500972412",
    appId: "1:519500972412:web:8996098156e956fe08a4f9"
  });

  const db  = getFirestore(app);
  const REF = doc(db, "checklist", "shared");

  window._firebase = {
    async load(){
      try{ const s=await getDoc(REF); return s.exists()?s.data():{checked:{},subChecked:{},notes:{}}; }
      catch(e){ return {checked:{},subChecked:{},notes:{}}; }
    },
    async save(data){ try{ await setDoc(REF,data); }catch(e){} },
    subscribe(cb){ return onSnapshot(REF, s=>{ if(s.exists()) cb(s.data()); }, e=>console.error(e)); }
  };
  window._firebaseReady=true;
  window.dispatchEvent(new Event("firebaseReady"));
</script>

final",label:"Final Stretch",subtitle:"Weeks 37\u201340",weeks:[37,38,39,40]},{id:"after",label:"After Birth \u{1F476}",subtitle:"First 6 weeks",weeks:[41,42,43,44,45,46]}],Vy={s2:{title:"Car Seat Buying Guide",intro:"The car seat is non-negotiable \u2014 you can't leave the hospital without one.",tips:["Infant seats (0\u201330 lbs) are easiest for newborns but you'll need to upgrade around year 1.","Convertible seats last from birth to ~65 lbs \u2014 more upfront cost, but only one purchase.","NEVER buy a used car seat \u2014 you can't verify its crash history.","Check the expiration date (usually 6\u201310 years from manufacture)."],picks:[{name:"Chicco KeyFit 35",type:"Infant",rating:"\u2B50\u2B50\u2B50\u2B50\u2B50",note:"Best overall ease of install. Top pick by Wirecutter."},{name:"Graco SnugRide 35 Lite",type:"Infant",rating:"\u2B50\u2B50\u2B50\u2B50\xBD",note:"Lightest infant seat. Great for smaller cars."},{name:"Britax One4Life",type:"Convertible",rating:"\u2B50\u2B50\u2B50\u2B50\u2B50",note:"Grows from 5 lbs to 120 lbs. Exceptional safety ratings."},{name:"Graco Extend2Fit",type:"Convertible",rating:"\u2B50\u2B50\u2B50\u2B50\xBD",note:"Best budget convertible. Rear-faces longer than most."}]},s5:{title:"Breast Pump Guide",intro:"Most insurance plans cover a pump at 100% \u2014 call your insurer before buying anything.",tips:["Double electric pumps are most efficient for regular pumping.","Wearable pumps (like Elvie or Willow) are great for pumping hands-free at work.","Your flange size matters \u2014 wrong size = pain and reduced output. A lactation consultant can help.","Hospital-grade pumps can be rented if you have supply issues."],picks:[{name:"Spectra S2",type:"Double Electric",rating:"\u2B50\u2B50\u2B50\u2B50\u2B50",note:"Most recommended by lactation consultants. Quiet and effective."},{name:"Medela Pump In Style",type:"Double Electric",rating:"\u2B50\u2B50\u2B50\u2B50\xBD",note:"Widely covered by insurance. Portable with MaxFlow tech."},{name:"Elvie Stride",type:"Wearable",rating:"\u2B50\u2B50\u2B50\u2B50",note:"Hands-free, fits in a bra. Good for back-to-work moms."},{name:"Willow 3.0",type:"Wearable",rating:"\u2B50\u2B50\u2B50\u2B50",note:"Completely self-contained \u2014 no tubes. Premium but pricey."}]},s6:{title:"Baby Monitor Guide",intro:"You'll be staring at this monitor constantly. Invest in something you trust.",tips:["Video monitors with night vision are worth the extra cost \u2014 you'll use it every night for years.","Wi-Fi monitors let you check from your phone anywhere. Non-Wi-Fi monitors have less hacking risk.","Pan/tilt cameras let you see the whole crib without entering the room.","Some monitors track breathing/heart rate (Owlet) \u2014 reassuring but not medically certified."],picks:[{name:"Nanit Pro",type:"Wi-Fi Video",rating:"\u2B50\u2B50\u2B50\u2B50\u2B50",note:"Best picture quality. Tracks sleep patterns. App-based."},{name:"Infant Optics DXR-8 Pro",type:"Non-Wi-Fi Video",rating:"\u2B50\u2B50\u2B50\u2B50\u2B50",note:"No internet required. Dedicated display, excellent range."},{name:"Owlet Dream Duo",type:"Video + Vitals",rating:"\u2B50\u2B50\u2B50\u2B50",note:"Includes sock that tracks O2 and heart rate. Peace of mind."},{name:"Eufy SpaceView",type:"Non-Wi-Fi Video",rating:"\u2B50\u2B50\u2B50\u2B50",note:'Large 5" display, great budget option for video monitoring.'}]},n3:{title:"Crib & Sleep Setup Guide",intro:"Safe sleep saves lives. The AAP guidelines are clear \u2014 follow them closely.",tips:["Firm, flat mattress only. No soft bedding, bumpers, pillows, or positioners in the crib.","Baby sleeps ALONE, on their BACK, in a CRIB (the ABCs of safe sleep).","Bassinet first: many parents use a bedside bassinet for the first 3\u20134 months for easy night feeds.","Mattress should fit snugly \u2014 no more than two fingers between mattress and crib side."],picks:[{name:"SNOO Smart Bassinet",type:"Bassinet",rating:"\u2B50\u2B50\u2B50\u2B50\u2B50",note:"Auto-responds to crying with motion + sound. Pricey but sleep-saving."},{name:"Halo BassiNest",type:"Bassinet",rating:"\u2B50\u2B50\u2B50\u2B50\xBD",note:"Swivels to bedside. Great for C-section recovery."},{name:"IKEA Sundvik Crib",type:"Crib",rating:"\u2B50\u2B50\u2B50\u2B50\u2B50",note:"Best budget crib. Simple, sturdy, converts to toddler bed."},{name:"Babyletto Hudson",type:"Crib",rating:"\u2B50\u2B50\u2B50\u2B50\u2B50",note:"Gorgeous mid-century look, non-toxic finish, converts to toddler/full."},{name:"Newton Baby Crib Mattress",type:"Mattress",rating:"\u2B50\u2B50\u2B50\u2B50\u2B50",note:"100% breathable, washable cover. Top safety ratings."}]},s11:{title:"White Noise Machine Guide",intro:"White noise mimics the sounds baby heard in the womb \u2014 one of the most effective sleep tools you'll own.",tips:["Volume should be around 65\u201370 dB (about the level of a shower). Not too loud, not too quiet.","Place the machine across the room from the crib, not right next to their ear.","Some machines auto-detect crying and respond \u2014 helpful for light sleepers.","Pink noise (deeper than white noise) may be more soothing for some babies."],picks:[{name:"Hatch Rest+",type:"Smart",rating:"\u2B50\u2B50\u2B50\u2B50\u2B50",note:"App-controlled, doubles as night light. Grows with child to toddler."},{name:"LectroFan Classic",type:"Simple",rating:"\u2B50\u2B50\u2B50\u2B50\u2B50",note:"20 sounds, no frills, incredibly effective. Top-rated on Amazon."},{name:"Yogasleep Dohm",type:"Natural",rating:"\u2B50\u2B50\u2B50\u2B50\xBD",note:"Real fan-based white noise. The OG machine, beloved by parents for decades."}]}},Ly={s9:{title:"Hospital Bag \u2014 Complete Packing List",sections:[{label:"For Mom (Labor & Delivery)",items:["Photo ID and insurance card","Birth plan (printed, 2 copies)","Phone charger (extra long cable)","Lip balm (you'll be breathing hard)","Hair ties / headband","Cozy socks with grip","Your own pillow (in a colored pillowcase)","Robe or button-front top for skin-to-skin","Snacks for labor (clear liquids first, then ask nurses)","Music or podcast playlist downloaded offline"]},{label:"For Mom (Recovery Stay)",items:["Loose, comfortable going-home outfit","Nursing bras x2 (if breastfeeding)","Nipple cream (Lansinoh)","Toiletries: shampoo, dry shampoo, face wash, deodorant","Comfortable underwear \u2014 or hospital will provide mesh ones (take theirs!)","Flip flops for shower","Entertainment: book, tablet, downloads (hospital Wi-Fi is slow)"]},{label:"For Baby",items:["Going-home outfit (one size up from newborn, just in case)","Swaddle blanket","Infant car seat (installed in the car BEFORE you go)","Booties or socks","Newborn hat (hospital usually provides, but bring a cute one)"]},{label:"For Partner / Support Person",items:["Change of clothes for 1\u20132 nights","Snacks and cash for vending machines","Phone charger","Pillow and blanket (hospital ones are thin)","Camera or make sure phone is charged","List of people to text/call after birth"]}]},a7:{title:"Choosing a Pediatrician \u2014 Checklist",sections:[{label:"Research Phase",items:["Ask your OB for recommendations","Ask friends with young kids in your area","Check insurance network (in-network is important)","Look at Google reviews \u2014 focus on wait times and communication","Confirm the practice accepts newborns"]},{label:"Questions to Ask at Interview",items:["What hospital are you affiliated with?","How are after-hours calls handled?","What is your stance on vaccines? (You want: pro-vaccine)","How long is a typical well-visit appointment?","Can I reach you by text or patient portal?","What's your newborn visit schedule?","How do you handle sick visits \u2014 same day or next day?"]},{label:"Practical Checks",items:["Office is a reasonable distance from home","Parking is manageable (you'll go often in year 1)","Staff is friendly on the phone when you call to ask questions","They see newborns within 2\u20133 days of hospital discharge"]}]},ad5:{title:"Will & Financial Prep \u2014 Action Items",sections:[{label:"Legal Documents",items:["Draft or update your will with a named guardian for your child","Create a healthcare proxy / medical power of attorney (both parents)","Set up a durable power of attorney","Store documents in a fireproof safe or with your attorney","Tell the named guardian \u2014 make sure they've agreed"]},{label:"Financial Accounts",items:["Update life insurance beneficiary to spouse / trust","Update 401k beneficiary","Review term life insurance \u2014 new parents typically need 10\u201312x annual income","Consider opening a 529 college savings plan after birth","Add baby to health insurance within 30 days of birth"]},{label:"Practical Prep",items:["Write down all account numbers, passwords, and where documents are stored","Share this list with your spouse in a secure way (e.g., 1Password)","Review monthly expenses and set a parental-leave budget"]}]},sc5:{title:"Freezer Meal Plan",sections:[{label:"Best Meals to Freeze",items:["Lasagna (make double, freeze one)","Turkey or beef chili","Chicken enchiladas","Soup: chicken noodle, lentil, minestrone","Breakfast burritos (individually wrapped)","Muffins and banana bread (easy one-handed snacks)","Pulled pork or carnitas (versatile \u2014 tacos, bowls, sandwiches)","Mac and cheese (comfort food when you're exhausted)"]},{label:"Freezer Prep Tips",items:["Label everything with name, date, and reheating instructions","Use gallon zip-lock bags for soups \u2014 freeze flat to save space","Freeze in single-meal portions so nothing goes to waste","Pre-freeze on a baking sheet before bagging (prevents clumping)","Aim for 15\u201320 meals before your due date","Accept meals from friends and family \u2014 say yes to every offer"]}]},n9:{title:"Baby-Proofing Checklist",sections:[{label:"Electrical & Furniture",items:["Install outlet covers on all accessible outlets","Anchor all tall furniture to the wall (dressers, bookshelves, TVs)","Secure TV to wall or TV stand","Cover sharp furniture corners with foam guards","Remove or secure any floor lamps that could tip"]},{label:"Cabinets & Drawers",items:["Install magnetic or slide locks on lower cabinets","Lock cabinets with cleaning supplies, medicines, or sharp objects","Move medications to a high, locked location","Secure the refrigerator if needed"]},{label:"Doors & Stairs",items:["Install safety gates at top and bottom of all stairs","Add door pinch guards to prevent finger injuries","Add door knob covers to rooms that are off-limits","Install door stops to prevent doors slamming on small fingers"]},{label:"Windows & Outdoors",items:["Install window guards or stops on windows above ground floor","Check that window blind cords are out of reach (strangulation hazard)","Fence or gate pool or water features","Check yard for toxic plants"]}]}},Ky=[{id:"a1",category:"appointments",week:16,priority:"high",label:"16-week prenatal checkup",notes:"Blood pressure, fundal height, fetal heartbeat check"},{id:"a2",category:"appointments",week:18,priority:"high",label:"Anatomy ultrasound (18\u201320 weeks)",notes:"Detailed scan of baby's organs and anatomy. Can find out sex if desired!"},{id:"a3",category:"appointments",week:20,priority:"medium",label:"20-week milestone appointment",notes:"Review anatomy scan results with OB"},{id:"a4",category:"appointments",week:24,priority:"medium",label:"24-week prenatal checkup",notes:"Routine vitals, bump measurement, questions for OB"},{id:"a5",category:"appointments",week:24,priority:"high",label:"Glucose screening test (24\u201328 weeks)",notes:"Tests for gestational diabetes. You'll drink a sweet drink and wait 1 hour"},{id:"a6",category:"appointments",week:28,priority:"high",label:"28-week checkup + Rh factor shot",notes:"If mom is Rh-negative, she'll receive a Rhogam shot now"},{id:"a7",category:"appointments",week:28,priority:"high",label:"Choose a pediatrician",notes:"Research and interview pediatricians before birth \u2014 they'll see baby at 2\u20133 days old",hasSubChecklist:!0},{id:"a8",category:"appointments",week:30,priority:"medium",label:"Hospital tour / birth center visit",notes:"Know your route, parking, and check-in procedure before labor begins"},{id:"a9",category:"appointments",week:32,priority:"medium",label:"32-week prenatal checkup",notes:"Baby's position starts to matter \u2014 ask OB"},{id:"a10",category:"appointments",week:32,priority:"medium",label:"Sign up for childbirth classes",notes:"Lamaze, Bradley method, or hospital-run classes \u2014 book early, they fill up"},{id:"a11",category:"appointments",week:35,priority:"high",label:"Group B Strep test (35\u201337 weeks)",notes:"Vaginal/rectal swab test \u2014 results affect birth plan if positive"},{id:"a12",category:"appointments",week:36,priority:"high",label:"Weekly appointments begin (36+ weeks)",notes:"From here until birth, you'll see your OB every week"},{id:"a13",category:"appointments",week:36,priority:"high",label:"Tdap vaccine for mom (and dad!)",notes:"Protects newborn from whooping cough before they can be vaccinated"},{id:"a14",category:"appointments",week:38,priority:"high",label:"Discuss birth plan with OB",notes:"Pain management preferences, cord clamping, skin-to-skin, etc."},{id:"a15",category:"appointments",week:40,priority:"medium",label:"40-week appointment & post-dates talk",notes:"If baby hasn't arrived, discuss induction timeline"},{id:"n1",category:"nursery",week:20,priority:"medium",label:"Decide on nursery room and theme",notes:"Get aligned on colors, style, and vibe before buying anything"},{id:"n2",category:"nursery",week:22,priority:"medium",label:"Paint nursery walls",notes:"Use low-VOC paint. Finish early so fumes can air out well before birth"},{id:"n3",category:"nursery",week:24,priority:"high",label:"Order crib or bassinet",notes:"Crib mattress should be firm, flat, and fit snugly. Avoid soft bedding (safe sleep guidelines)",hasShoppingGuide:!0},{id:"n4",category:"nursery",week:26,priority:"high",label:"Assemble crib and furniture",notes:"Check for recalls at cpsc.gov. Assembly takes longer than expected"},{id:"n5",category:"nursery",week:28,priority:"medium",label:"Install blackout curtains",notes:"Essential for daytime naps. Babies sleep best in a dark, cool room"},{id:"n6",category:"nursery",week:28,priority:"medium",label:"Set up diaper changing station",notes:"Include: diapers, wipes, diaper cream, a changing pad with cover, a spare outfit"},{id:"n7",category:"nursery",week:30,priority:"medium",label:"Install baby monitor",notes:"Video monitors give peace of mind. Look for ones with good night vision"},{id:"n8",category:"nursery",week:32,priority:"medium",label:"Wash and organize baby clothing & linens",notes:"Use fragrance-free detergent (Dreft or All Free & Clear)"},{id:"n9",category:"nursery",week:34,priority:"high",label:"Baby-proof danger areas",notes:"Outlet covers, cabinet locks, anchor tall furniture to walls",hasSubChecklist:!0},{id:"n10",category:"nursery",week:36,priority:"medium",label:"Set up feeding / nursing station",notes:"A good glider + ottoman + side table with lamp changes nighttime feeds completely"},{id:"s1",category:"shopping",week:18,priority:"high",label:"Create baby registry",notes:"Register at 2\u20133 stores. Include a range of price points for gift-givers"},{id:"s2",category:"shopping",week:22,priority:"high",label:"Research and buy car seat",notes:"You CANNOT leave the hospital without one. Must be installed before birth",hasShoppingGuide:!0},{id:"s3",category:"shopping",week:24,priority:"high",label:"Get car seat professionally installed",notes:"Many fire stations and certified techs offer free installation checks"},{id:"s4",category:"shopping",week:26,priority:"medium",label:"Stock up on newborn & 0\u20133M clothing",notes:"Don't overbuy newborn \u2014 babies grow fast. Focus on sleepers and onesies"},{id:"s5",category:"shopping",week:28,priority:"high",label:"Purchase breast pump (if nursing)",notes:"Most insurance plans cover a pump. Call your insurer first",hasShoppingGuide:!0},{id:"s6",category:"shopping",week:28,priority:"medium",label:"Buy a baby monitor",notes:"Consider Nanit, Owlet, or Infant Optics \u2014 look for HD night vision",hasShoppingGuide:!0},{id:"s7",category:"shopping",week:30,priority:"medium",label:"Stock feeding supplies",notes:"Bottles, burp cloths x10+, nursing pads, nipple cream"},{id:"s8",category:"shopping",week:32,priority:"medium",label:"Buy a baby bathtub",notes:"Infant tubs with a hammock insert are easiest for newborns"},{id:"s9",category:"shopping",week:32,priority:"high",label:"Pack hospital bag",notes:"Pack at 36 weeks \u2014 but prep the list now",hasSubChecklist:!0},{id:"s10",category:"shopping",week:34,priority:"high",label:"Stock diaper supplies",notes:"Newborns go through 8\u201312 diapers/day. Stock 2\u20133 packs newborn, more in size 1"},{id:"s11",category:"shopping",week:34,priority:"medium",label:"Buy white noise machine",notes:"Babies slept with the sound of your heartbeat for 9 months. White noise helps them settle",hasShoppingGuide:!0},{id:"s12",category:"shopping",week:36,priority:"low",label:"Install baby tracking app",notes:"Apps like Huckleberry or Baby Tracker help log feeds, diapers, and sleep"},{id:"ad1",category:"admin",week:18,priority:"high",label:"Notify HR \u2014 understand parental leave",notes:"Start paperwork early. Know your last day, pay continuation, and return-to-work options"},{id:"ad2",category:"admin",week:22,priority:"high",label:"Review health insurance for baby",notes:"You have 30 days after birth to add baby \u2014 missing this window can be costly"},{id:"ad3",category:"admin",week:24,priority:"medium",label:"Review life insurance",notes:"Having a child is a major trigger to review coverage for both parents"},{id:"ad4",category:"admin",week:26,priority:"high",label:"Research childcare / daycare options",notes:"Good daycares have 6\u201318 month waiting lists. Start NOW"},{id:"ad5",category:"admin",week:28,priority:"high",label:"Create or update will
